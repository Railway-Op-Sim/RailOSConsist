name: RailOSConsist
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  testing:
    runs-on: windows-latest
    name: RailOS Consist Testing
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: "x64"
      - name: Setup UV
        run: |
          python -m pip install uv
          uv sync --all-extras
      - name: Run Unit Tests
        run: uv run pytest --cov=railos_consists -x -c /dev/null
        shell: bash
      - name: Get Previous tag
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@v1"

      - name: Build application
        run: uv run pyinstaller --clean -y RailOSConsist.spec
        shell: bash
