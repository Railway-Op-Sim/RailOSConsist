name: RailOSConsist Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  create-pdf:
    name: Create Readme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Markdown to PDF and HTML
        uses: BaileyJM02/markdown-to-pdf@v1.2.0
        with:
          images_dir: media
          input_path: README.md
          output_dir: pdfs
          build_pdf: true
          build_html: false
      - name: Archive README
        uses: actions/upload-artifact@v4
        with:
          name: railosconsist-readme
          path: pdfs
          if-no-files-found: error
          retention-days: 1

  quality-check:
    name: Quality Control Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check code formatting
        run: cargo fmt -- --check
      - name: Run Clippy lints
        run: cargo clippy --all -- -D warnings
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Check for security vulnerabilities
        run: cargo audit
      - name: Build documentation
        run: cargo doc --no-deps --document-private-items

  generate-docs-pdf:
    name: Generate Developer Documentation PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate Cargo documentation
        run: cargo doc --no-deps --document-private-items
      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf xvfb
      - name: Convert documentation to PDF
        run: |
          xvfb-run -a wkhtmltopdf \
            --enable-local-file-access \
            --print-media-type \
            --margin-top 10 \
            --margin-bottom 10 \
            --margin-left 10 \
            --margin-right 10 \
            "target/doc/RailOSConsist/index.html" \
            "RailOSConsist-Developer-API-Documentation.pdf"
      - name: Upload Documentation PDF
        uses: actions/upload-artifact@v4
        with:
          name: railosconsist-documentation-pdf
          path: RailOSConsist-Developer-API-Documentation.pdf
          if-no-files-found: error
          retention-days: 1

  build-release:
    name: Build Release (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: [create-pdf, quality-check, generate-docs-pdf]
    strategy:
      matrix:
        include:
          - os: windows-latest
            binary_name: railosconsist.exe
            asset_name: railosconsist-windows-x86_64
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            binary_name: railosconsist
            asset_name: railosconsist-macos-x86_64
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-latest
            binary_name: railosconsist
            asset_name: railosconsist-macos-aarch64
            arch: aarch64
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            binary_name: railosconsist
            asset_name: railosconsist-linux-x86_64
            arch: x86_64
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Retrieve README PDF
        uses: actions/download-artifact@v4
        with:
          name: railosconsist-readme
          path: .publish-docs/
      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v1.4.0
      - name: Set Version Suffix
        id: outver
        run: |
          VERSION="${{ steps.previoustag.outputs.tag }}"
          echo "version=${VERSION//./}_" >> $GITHUB_OUTPUT
        shell: bash
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-bundle (macOS)
        if: runner.os == 'macOS'
        run: cargo install cargo-bundle
      - name: Build Rust Release (macOS)
        if: runner.os == 'macOS'
        run: cargo bundle --release --target ${{ matrix.target }}
      - name: Build Rust Release (Windows/Linux)
        if: runner.os != 'macOS'
        run: cargo build --release --target ${{ matrix.target }}
      - name: Create Package
        run: |
          mkdir -p release
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # macOS: Copy the app bundle
            cp -r target/release/bundle/osx/RailOSConsist.app release/
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            # Windows: Copy the executable
            cp target/${{ matrix.target }}/release/railosconsist.exe release/
          else
            # Linux: Copy the binary
            cp target/${{ matrix.target }}/release/railosconsist release/
          fi
          cp .publish-docs/README.pdf release/README.pdf
        shell: bash
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          filename: "${{ matrix.asset_name }}_${{ steps.outver.outputs.version }}.zip"
          path: "release"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: "${{ matrix.asset_name }}_${{ steps.outver.outputs.version }}.zip"
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - uses: actions/checkout@v4
      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v1.4.0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Prepare release files
        run: |
          mkdir -p final-release
          mv release-artifacts/railosconsist-windows-x86_64/* final-release/ || true
          mv release-artifacts/railosconsist-macos-x86_64/* final-release/ || true
          mv release-artifacts/railosconsist-macos-aarch64/* final-release/ || true
          mv release-artifacts/railosconsist-linux-x86_64/* final-release/ || true
          mv release-artifacts/railosconsist-documentation-pdf/* final-release/ || true
        shell: bash
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.7
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          name: ${{ github.repository }} Release ${{ steps.previoustag.outputs.tag }}
          tag_name: ${{ steps.previoustag.outputs.tag }}
          files: final-release/*.zip
