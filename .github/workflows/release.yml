name: RailOSConsist Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  create-pdf:
    name: Create Readme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown to PDF and HTML
        uses: BaileyJM02/markdown-to-pdf@v1.2.0
        with:
          images_dir: media
          input_path: README.md
          output_dir: pdfs
          build_pdf: true
          build_html: false
      - name: Archive README
        uses: actions/upload-artifact@v4
        with:
          name: railosconsist-readme
          path: pdfs
          if-no-files-found: error
          retention-days: 1

  build-release:
    name: Build Release (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: [create-pdf]
    strategy:
      matrix:
        include:
          - os: windows-latest
            binary_name: railosconsist.exe
            asset_name: railosconsist-windows-x86_64
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            binary_name: railosconsist
            asset_name: railosconsist-macos-x86_64
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-latest
            binary_name: railosconsist
            asset_name: railosconsist-macos-aarch64
            arch: aarch64
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            binary_name: railosconsist
            asset_name: railosconsist-linux-x86_64
            arch: x86_64
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Retrieve README PDF
        uses: actions/download-artifact@v4
        with:
          name: railosconsist-readme
          path: .publish-docs/
      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v1.4.0
      - name: Set Version Suffix
        id: outver
        run: |
          VERSION="${{ steps.previoustag.outputs.tag }}"
          echo "version=${VERSION//./}_" >> $GITHUB_OUTPUT
        shell: bash
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Rust Release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Create Package
        run: |
          mkdir -p release
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/railosconsist.exe release/
          else
            cp target/${{ matrix.target }}/release/railosconsist release/
          fi
          cp .publish-docs/README.pdf release/README.pdf
        shell: bash
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: "zip"
          filename: "${{ matrix.asset_name }}_${{ steps.outver.outputs.version }}.zip"
          path: "release"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: "${{ matrix.asset_name }}_${{ steps.outver.outputs.version }}.zip"
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-release]
    steps:
      - uses: actions/checkout@v4
      - name: Get Previous tag
        id: previoustag
        uses: WyriHaximus/github-action-get-previous-tag@v1.4.0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Prepare release files
        run: |
          mkdir -p final-release
          mv release-artifacts/railosconsist-windows-x86_64/* final-release/ || true
          mv release-artifacts/railosconsist-macos-x86_64/* final-release/ || true
          mv release-artifacts/railosconsist-macos-aarch64/* final-release/ || true
          mv release-artifacts/railosconsist-linux-x86_64/* final-release/ || true
        shell: bash
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.7
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          name: ${{ github.repository }} Release ${{ steps.previoustag.outputs.tag }}
          tag_name: ${{ steps.previoustag.outputs.tag }}
          files: final-release/*.zip
